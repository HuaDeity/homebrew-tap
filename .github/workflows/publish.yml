name: brew pr-pull

# Reference for future maintenance:
# - Homebrew/homebrew-core/.github/workflows/publish-commit-bottles.yml — official publish workflow
# - Homebrew/brew Library/Homebrew/dev-cmd/pr-pull.rb — brew pr-pull internals
# - Homebrew/brew Library/Homebrew/dev-cmd/pr-upload.rb — bottle upload and GHCR logic
#
# Key notes:
# - Uses pull_request_target so this workflow always runs from main (not the PR branch),
#   giving it write permissions regardless of fork. Never run untrusted code here.
# - --root-url is passed to brew pr-upload, which uses it to determine the upload service
#   (GHCR vs GitHub Releases). The formula's root_url comes from the bottle JSON generated
#   by brew test-bot (see tests.yml --root-url), NOT from this flag.
# - HOMEBREW_GITHUB_PACKAGES_USER/TOKEN are required for skopeo to push OCI images to GHCR.

on:
  pull_request_target:
    types:
      - labeled

permissions:
  actions: read
  checks: read
  contents: write
  issues: read
  packages: write
  pull-requests: write

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/brew:main
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main
        with:
          directory: ${{ steps.set-up-homebrew.outputs.repository-path }}

      - name: Pull and upload bottles
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: huadeity
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: |
          brew pr-pull \
            --debug \
            --workflows=tests.yml \
            --root-url="https://ghcr.io/v2/huadeity/homebrew-tap" \
            --tap="$GITHUB_REPOSITORY" \
            "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
          branch: main

      - name: Delete branch
        if: github.event.pull_request.head.repo.fork == false
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: git push --delete origin "$BRANCH"
