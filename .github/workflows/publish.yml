name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled

permissions:
  actions: read
  checks: read
  contents: write
  issues: read
  packages: write
  pull-requests: write

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/brew:main
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main
        with:
          directory: ${{ steps.set-up-homebrew.outputs.repository-path }}

      - name: Pull bottles
        id: pr-pull
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: |
          brew pr-pull \
            --debug \
            --no-upload \
            --no-cherry-pick \
            --retain-bottle-dir \
            --workflows=tests.yml \
            --root-url="https://ghcr.io/v2/huadeity/homebrew-tap" \
            --tap="$GITHUB_REPOSITORY" \
            "$PULL_REQUEST"

      - name: Upload bottles to GHCR
        env:
          HOMEBREW_GITHUB_PACKAGES_USER: huadeity
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ steps.pr-pull.outputs.bottle_path }}
        run: brew pr-upload --debug --root-url="https://ghcr.io/v2/huadeity/homebrew-tap"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
          branch: main

      - name: Delete branch
        if: github.event.pull_request.head.repo.fork == false
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: git push --delete origin "$BRANCH"
